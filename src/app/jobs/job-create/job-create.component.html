<div class="job-create-container">
  <h2>Post a New Job</h2>

  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>

  <form [formGroup]="jobForm" (ngSubmit)="submitJob()">
    <div class="form-group">
      <label for="title">Title</label>
      <input id="title" formControlName="title" type="text" placeholder="e.g. Frontend Developer Needed" />
      <div class="error-text" *ngIf="jobForm.get('title')?.invalid && jobForm.get('title')?.touched">
        Title is required.
      </div>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" formControlName="description" rows="5" placeholder="Describe the job requirements..."></textarea>
      <div class="error-text" *ngIf="jobForm.get('description')?.invalid && jobForm.get('description')?.touched">
        Description is required.
      </div>
    </div>

    <div class="form-row">
      <div class="form-group half-width">
        <label for="budget">Budget ($)</label>
        <input id="budget" formControlName="budget" type="number" placeholder="0.00" />
        <div class="error-text" *ngIf="jobForm.get('budget')?.invalid && jobForm.get('budget')?.touched">
          Valid budget is required.
        </div>
      </div>

      <div class="form-group half-width">
        <label for="category">Category</label>
        <input id="category" formControlName="category" type="text" placeholder="e.g. Web Development" />
        <div class="error-text" *ngIf="jobForm.get('category')?.invalid && jobForm.get('category')?.touched">
          Category is required.
        </div>
      </div>
    </div>

    <div class="form-actions">
      <button type="submit" class="btn save-btn" [disabled]="jobForm.invalid">Create Job</button>
    </div>
  </form>
</div>
