<div class="job-edit-container">
  <h2>Edit Job</h2>

  <div *ngIf="isLoading" class="loading">
    Loading job data...
  </div>

  <div *ngIf="errorMessage" class="error-message">
    {{ errorMessage }}
  </div>

  <form *ngIf="!isLoading" [formGroup]="jobForm" (ngSubmit)="submitJob()">
    <div class="form-group">
      <label for="title">Title</label>
      <input id="title" formControlName="title" type="text" />
      <div class="error-text" *ngIf="jobForm.get('title')?.invalid && jobForm.get('title')?.touched">
        Title is required.
      </div>
    </div>

    <div class="form-group">
      <label for="description">Description</label>
      <textarea id="description" formControlName="description" rows="5"></textarea>
      <div class="error-text" *ngIf="jobForm.get('description')?.invalid && jobForm.get('description')?.touched">
        Description is required.
      </div>
    </div>

    <div class="form-row">
      <div class="form-group half-width">
        <label for="budget">Budget ($)</label>
        <input id="budget" formControlName="budget" type="number" />
        <div class="error-text" *ngIf="jobForm.get('budget')?.invalid && jobForm.get('budget')?.touched">
          Valid budget is required.
        </div>
      </div>

      <div class="form-group half-width">
        <label for="category">Category</label>
        <input id="category" formControlName="category" type="text" />
        <div class="error-text" *ngIf="jobForm.get('category')?.invalid && jobForm.get('category')?.touched">
          Category is required.
        </div>
      </div>
    </div>
    
    <div class="form-group">
        <label for="status">Status</label>
        <select id="status" formControlName="status">
            <option value="open">Open</option>
            <option value="in_progress">In Progress</option>
            <option value="completed">Completed</option>
        </select>
        <div class="error-text" *ngIf="jobForm.get('status')?.invalid && jobForm.get('status')?.touched">
          Status is required.
        </div>
    </div>

    <div class="form-actions">
      <button type="button" class="btn cancel-btn" (click)="cancel()">Cancel</button>
      <button type="submit" class="btn save-btn" [disabled]="jobForm.invalid">Save Changes</button>
    </div>
  </form>
</div>
