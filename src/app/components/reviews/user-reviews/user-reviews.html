<div style="max-width: 800px; margin: 20px auto; font-family: sans-serif;">
  <h2>Reviews for User #{{ userId }}</h2>

  <p *ngIf="errorMessage" style="color: red;">{{ errorMessage }}</p>

  <div *ngIf="reviews.length === 0 && !errorMessage">
    <p>This user has no reviews yet.</p>
  </div>

  <div *ngFor="let review of reviews" style="border: 1px solid #ddd; padding: 15px; margin-bottom: 10px; border-radius: 5px; background: #fafafa;">
    <h4 style="margin-top: 0; color: #ff9900;">Rating: {{ review.rating }} / 5</h4>
    <p style="margin-bottom: 0;">"{{ review.comment }}"</p>
  </div>
</div>
