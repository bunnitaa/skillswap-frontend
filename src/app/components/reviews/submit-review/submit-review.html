<div style="max-width: 500px; margin: 40px auto; padding: 20px; border-top: 2px solid #eee;">
  <h2>Leave a Review</h2>
  
  <p *ngIf="errorMessage" style="color: red;">{{ errorMessage }}</p>
  <p *ngIf="successMessage" style="color: green;">{{ successMessage }}</p>

  <form [formGroup]="reviewForm" (ngSubmit)="onSubmit()">
    <label style="display: block; margin-bottom: 5px;">Rating (1 to 5)</label>
    <input type="number" formControlName="rating" min="1" max="5" style="width: 100%; padding: 8px; margin-bottom: 15px;">

    <label style="display: block; margin-bottom: 5px;">Comment</label>
    <textarea formControlName="comment" rows="3" style="width: 100%; padding: 8px; margin-bottom: 15px;"></textarea>

    <button type="submit" [disabled]="reviewForm.invalid" style="width: 100%; padding: 10px; background: #28a745; color: white; border: none; cursor: pointer;">
      Submit Review
    </button>
  </form>
</div>
